<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="econstruct animated favicon">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C8102E" />
      <stop offset="0.55" stop-color="#A90D24" />
      <stop offset="1" stop-color="#6F0716" />
      <animateTransform
        attributeName="gradientTransform"
        type="scale"
        values="1 1;1.03 1.03;1 1"
        dur="5s"
        repeatCount="indefinite"
      />
    </linearGradient>
    <linearGradient id="ring" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5D07A" />
      <stop offset="0.5" stop-color="#D9B661" />
      <stop offset="1" stop-color="#FFF1C2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#2A050A" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#bg)" />
  <rect x="3.75" y="3.75" width="56.5" height="56.5" rx="15.25" stroke="rgba(255,255,255,0.16)" stroke-width="1.5" />

  <g filter="url(#shadow)">
    <circle cx="32" cy="32" r="21" fill="none" stroke="url(#ring)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="36 96">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 32 32"
        to="360 32 32"
        dur="4.4s"
        repeatCount="indefinite"
      />
    </circle>
  </g>

  <g filter="url(#shadow)">
    <text
      x="32"
      y="39"
      text-anchor="middle"
      font-family="Arial, Helvetica, sans-serif"
      font-size="30"
      font-weight="900"
      fill="#FFFFFF"
      letter-spacing="-1"
    >
      e
      <animate
        attributeName="opacity"
        values="0.72;1;0.9;1"
        dur="2.8s"
        repeatCount="indefinite"
      />
    </text>
  </g>

  <circle cx="46.5" cy="17.5" r="2.5" fill="#F5D07A">
    <animate attributeName="r" values="2.2;3;2.2" dur="2.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.2s" repeatCount="indefinite" />
  </circle>
</svg>
