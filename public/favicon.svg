<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="eConstruct favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D61F3A" />
      <stop offset="0.5" stop-color="#C8102E" />
      <stop offset="1" stop-color="#8E0A1D" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.8" flood-color="#37040D" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="url(#bg)" />
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" />

  <g filter="url(#shadow)">
    <g transform-origin="32px 32px">
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="0 32 32;360 32 32"
        dur="12s"
        repeatCount="indefinite"
      />
      <text
        x="32"
        y="40"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="900"
        fill="#FFFFFF"
      >
        E
      </text>
    </g>
  </g>
</svg>
