name: Daily Content Engine

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  content-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Scan daily keyword opportunities
        run: node scripts/daily-seo-opportunities.mjs

      - name: Generate daily blog post
        run: node scripts/generate-daily-blog.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Sync blog manifest
        run: node scripts/sync-blog-manifest.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog src/lib/blog/content-manifest.ts data/seo
          git commit -m "chore: daily seo opportunities and blog post"
          git push
