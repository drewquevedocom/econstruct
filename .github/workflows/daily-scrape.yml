name: Daily LADBS Scrape

on:
  schedule:
    - cron: '0 11 * * *'  # 3am PT daily
  workflow_dispatch:       # Manual trigger

jobs:
  ladbs-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Run LADBS scraper
        run: npx tsx scripts/ladbs-scrape.ts
        env:
          SUPABASE_URL: https://dzudtdhmvnuipqyoogem.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
