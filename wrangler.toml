# ===========================================================
# wrangler.toml — eConstruct Cloudflare Worker Configuration
# ===========================================================

name = "econstruct"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ——————————————————————————————
# Custom Domains (both apex + www)
# ——————————————————————————————
[[routes]]
pattern = "econstructhomes.com"
custom_domain = true

[[routes]]
pattern = "www.econstructhomes.com"
custom_domain = true

# ——————————————————————————————
# Static Assets
# ——————————————————————————————
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ——————————————————————————————
# Environment Variables (non-secret)
# ——————————————————————————————
[vars]
NODE_ENV = "production"

# ——————————————————————————————
# Production Environment
# ——————————————————————————————
[env.production]
name = "econstruct"

[[env.production.routes]]
pattern = "econstructhomes.com"
custom_domain = true

[[env.production.routes]]
pattern = "www.econstructhomes.com"
custom_domain = true
