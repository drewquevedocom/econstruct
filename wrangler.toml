name = "econstruct"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[[routes]]
pattern = "econstructhomes.com"
custom_domain = true

[[routes]]
pattern = "www.econstructhomes.com"
custom_domain = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "econstruct"

[vars]
NODE_ENV = "production"

[env.production]
name = "econstruct"

[[env.production.routes]]
pattern = "econstructhomes.com"
custom_domain = true

[[env.production.routes]]
pattern = "www.econstructhomes.com"
custom_domain = true
