name = "econstruct"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[[routes]]
pattern = "econstructhomes.com"
custom_domain = true

[[routes]]
pattern = "www.econstructhomes.com"
custom_domain = true

# DNS records are managed in the Cloudflare DNS dashboard, not via Wrangler.
# Google Search Console TXT record for econstructhomes.com:
# Name: @
# Content: google-site-verification=Yk1vrhzmZYDfCFJH5UIxhS-KMPJ_YYgHcXPKpptyG4g

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "econstruct"

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_SUPABASE_URL = "https://dzudtdhmvnuipqyoogem.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6dWR0ZGhtdm51aXBxeW9vZ2VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDQ4MTMsImV4cCI6MjA5MTc4MDgxM30.OUwN6G_BvZRdTdl2XcxsE5Z19vOy_mRvEMKwZUwwNtE"

[env.production]
name = "econstruct"

# FIX: explicitly declare assets for production env.
# Wrangler does NOT automatically inherit [assets] into named environments.
# Without this block, `wrangler deploy --env production` deploys the Worker
# script only — no static assets uploaded — forcing every request through
# the Worker runtime (causing Error 1102 / CPU limit crashes).
[env.production.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[env.production.routes]]
pattern = "econstructhomes.com"
custom_domain = true

[[env.production.routes]]
pattern = "www.econstructhomes.com"
custom_domain = true
